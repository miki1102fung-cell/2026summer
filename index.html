<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒險地圖 - LEVEL UP 典禮挑戰</title>
    <style>
        /* 全局冒險主題風格 */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Microsoft JhengHei', sans-serif;
            background-color: #f4eae1;
            background-image: radial-gradient(#e0cfb8 2px, transparent 2px);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a3b32;
        }

        h1 {
            color: #d35400;
            text-shadow: 2px 2px 0px #f1c40f;
            margin: 10px 0;
            font-size: 28px;
        }

        /* 登入畫面 */
        #login-screen {
            background: #fff8ee;
            border: 6px solid #8b4513;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            margin-top: 50px;
        }
        .wood-title {
            background: #8b4513;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* 遊戲主畫面 */
        #game-screen { display: none; width: 100%; max-width: 1050px; text-align: center; }

        /* 頂部 LEVEL UP 收集槽 */
        .tracker-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            background: #fff3e0;
            padding: 12px 25px;
            border-radius: 50px;
            border: 4px solid #8b4513;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .letter-slot {
            width: 45px;
            height: 45px;
            background-color: #dcdde1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 900;
            color: #7f8fa6;
            border: 3px dashed #7f8fa6;
            transition: all 0.5s ease;
        }
        .letter-slot.active {
            background-color: #f1c40f;
            color: #d35400;
            border: 3px solid #e67e22;
            box-shadow: 0 0 12px #f1c40f;
            transform: scale(1.1);
        }

        /* 核心地圖容器 (流體自適應 + 固定寬高比) */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1000 / 562; /* 精確鎖定原圖比例，防止 iPad 或手機變形 */
            border: 8px solid #6d3710;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            background-color: #222;
        }

        /* 底層：全圖冷灰色調 */
        .map-base-gray {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.6) contrast(1.1);
            display: block;
        }

        /* 表層：不規則彩色切片 */
        .map-slice {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            pointer-events: none;
        }
        .map-slice img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .map-slice.unlocked { opacity: 1; }

        /* ✅ 已更新：對應你的上/下排順序調整地圖切塊 */
        /* 上排 (左到右): Limitless(1), Explore(2), Valued(3), Experience(4) */
        #slice-1 { clip-path: polygon(0% 0%, 30% 0%, 25% 25%, 35% 50%, 0% 45%); }
        #slice-2 { clip-path: polygon(30% 0%, 55% 0%, 60% 30%, 50% 52%, 35% 50%, 25% 25%); }
        #slice-3 { clip-path: polygon(55% 0%, 80% 0%, 75% 25%, 82% 55%, 50% 52%, 60% 30%); }
        #slice-4 { clip-path: polygon(80% 0%, 100% 0%, 100% 54%, 82% 55%, 75% 25%); }
        /* 下排 (左到右): Positive(7), Undertake(6), Leadership(5) */
        #slice-7 { clip-path: polygon(0% 45%, 35% 50%, 40% 75%, 30% 100%, 0% 100%); }
        #slice-6 { clip-path: polygon(35% 50%, 50% 52%, 82% 55%, 70% 80%, 75% 100%, 30% 100%, 40% 75%); }
        #slice-5 { clip-path: polygon(82% 55%, 100% 54%, 100% 100%, 75% 100%, 70% 80%); }

        /* 漂浮金鎖提示框 */
        .beige-box {
            position: absolute;
            background: #fdf5e6;
            border: 3px solid #cdb496;
            border-radius: 10px;
            padding: 6px 14px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #7f675b;
            transition: all 0.5s;
            z-index: 10;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            font-size: 15px; 
        }
        .beige-box.active {
            background: #fffdf0;
            border: 3px solid #f1c40f;
            color: #2c3e50;
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.6);
            transform: translate(-50%, -50%) scale(1.05);
        }
        .first-letter {
            font-size: 22px;
            font-weight: 900;
            color: #e74c3c;
            margin-right: 1px;
        }
        .lock-icon { font-size: 16px; color: #95a5a6; margin-right: 2px; }

        /* ✅ 已更新：精確對應標籤在畫面上的上下排順序 */
        /* 上排 */
        #box-1 { top: 17.0%; left: 15.5%; }
        #box-2 { top: 15.5%; left: 37.7%; }
        #box-3 { top: 12.0%; left: 62.1%; }
        #box-4 { top: 15.0%; left: 83.7%; }
        /* 下排 */
        #box-7 { top: 54.5%; left: 25.4%; }
        #box-6 { top: 68.5%; left: 53.5%; }
        #box-5 { top: 59.5%; left: 73.7%; }

        @media (max-width: 900px) {
            .beige-box { font-size: 12px; padding: 4px 10px; border-width: 2px; border-radius: 8px; }
            .first-letter { font-size: 17px; }
            .lock-icon { font-size: 13px; }
            h1 { font-size: 24px; }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 19px; }
            .letter-slot { width: 34px; height: 34px; font-size: 16px; border-width: 2px; }
            .tracker-container { gap: 6px; padding: 8px 15px; }
            .beige-box { font-size: 9px; padding: 2px 6px; border-width: 1.5px; border-radius: 5px; }
            .first-letter { font-size: 13px; }
            .lock-icon { font-size: 10px; }
            .control-panel { padding: 12px 20px; flex-direction: column; width: 100%; gap: 10px; }
            input[type="text"] { width: 100%; text-align: center; }
            button { width: 100%; }
        }

        /* 底部操作面板 */
        .control-panel {
            margin-top: 20px;
            background: #ecd5bc;
            padding: 15px 35px;
            border-radius: 15px;
            border: 4px solid #8b4513;
            display: inline-flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        input[type="text"] {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #a07855;
            border-radius: 8px;
            outline: none;
            width: 220px;
            text-transform: uppercase;
        }
        button {
            padding: 10px 22px;
            font-size: 16px;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0px #1e7e43;
            transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0px 0px #1e7e43; }
        .team-info-tag { font-size: 16px; font-weight: bold; color: #5d4037; margin-bottom: 5px;}

        /* 模態彈出視窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 6px solid #e67e22;
            max-width: 550px;
            width: 95%;
        }
        .close-btn { margin-top: 15px; background-color: #e74c3c; box-shadow: 0 4px 0px #c0392b; width: 100%; }

        /* 後台管理面板樣式 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .admin-table th { background-color: #f2f2f2; }
        .reset-btn { background-color: #7f8c8d; box-shadow: 0 4px 0px #95a5a6; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // ✅ 你的專屬 Firebase 金鑰設定已成功填入：
        const firebaseConfig = {
            apiKey: "AIzaSyDZLAI_OgQHI17HE5I4_JX9NDpGZmpF07g",
            authDomain: "project-2454444696087368590.firebaseapp.com",
            databaseURL: "https://project-2454444696087368590-default-rtdb.firebaseio.com",
            projectId: "project-2454444696087368590",
            storageBucket: "project-2454444696087368590.firebasestorage.app",
            messagingSenderId: "62468491829",
            appId: "1:62468491829:web:c9553b569ae638abf97f7c",
            measurementId: "G-67HW23QHMT"
        };
        // 初始化雲端資料庫
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
</head>
<body>

    <div id="login-screen">
        <h2 class="wood-title">📜 冒險者營地</h2>
        <p style="font-size: 16px; color: #6d4c41; line-height: 1.6;">歡迎各位冒險家！請輸入你們的「組別名稱」，並開始本次探險！</p>
        <input type="text" id="teamNameInput" placeholder="例如：大熊家族隊 / 第 3 組" style="width:80%; margin-bottom:20px; text-transform:none;"><br>
        <button onclick="startAdventure()">開啟冒險地圖 ✨</button>
    </div>

    <div id="game-screen">
        <div class="team-info-tag" id="currentTeamDisplay">冒險隊伍：</div>
        <h1>✨ 喚醒地圖拼圖挑戰 ✨</h1>

        <div class="tracker-container">
            <div class="letter-slot" id="slot-1">?</div>
            <div class="letter-slot" id="slot-2">?</div>
            <div class="letter-slot" id="slot-3">?</div>
            <div class="letter-slot" id="slot-4">?</div>
            <div class="letter-slot" id="slot-5">?</div>
            <div class="letter-slot" id="slot-6">?</div>
            <div class="letter-slot" id="slot-7">?</div>
        </div>

        <div class="map-wrapper">
            <img src="map-image.png" class="map-base-gray" alt="冒險地圖">

            <div class="map-slice" id="slice-1"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-2"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-3"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-4"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-5"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-6"><img src="map-image.png"></div>
            <div class="map-slice" id="slice-7"><img src="map-image.png"></div>

            <div class="beige-box" id="box-1"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-2"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-3"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-4"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-5"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-6"><span class="lock-icon">🔒 鎖定</span></div>
            <div class="beige-box" id="box-7"><span class="lock-icon">🔒 鎖定</span></div>
        </div>

        <br>
        <div class="control-panel">
            <input type="text" id="codeInputField" placeholder="輸入元素代碼..." autocomplete="off">
            <button onclick="submitCode()">解鎖拼圖 ✨</button>
        </div>
    </div>

    <div class="modal-overlay" id="commonModal">
        <div class="modal-content">
            <h2 id="modalTitle">提示</h2>
            <div id="modalBody" style="font-size: 16px; margin: 15px 0; line-height: 1.5; max-height: 350px; overflow-y: auto;">內容</div>
            <button id="modalBtn" class="close-btn" onclick="closeModal()">繼續前進</button>
        </div>
    </div>

    <script>
        const codeBook = {
            'L1': { id: 1, letter: 'L', word: 'imitless' },
            'E2': { id: 2, letter: 'E', word: 'xplore' },
            'V3': { id: 3, letter: 'V', word: 'alued' },
            'E4': { id: 4, letter: 'E', word: 'xperience' },
            'L5': { id: 5, letter: 'L', word: 'eadership' },
            'U6': { id: 6, letter: 'U', word: 'ndertake' },
            'P7': { id: 7, letter: 'P', word: 'ositive' }
        };

        let gameState = {
            teamName: "",
            startTime: "",
            unlockedIds: [],
            logs: []
        };

        window.onload = function() {
            const savedState = localStorage.getItem('adventure_game_state');
            if (savedState) {
                gameState = JSON.parse(savedState);
                renderSavedGame();
            }
        };

        function startAdventure() {
            const nameInput = document.getElementById('teamNameInput').value.trim();
            if (!nameInput) {
                alert("請先輸入你們的組別名稱唷！");
                return;
            }
            gameState.teamName = nameInput;
            gameState.startTime = new Date().toLocaleString();
            gameState.unlockedIds = [];
            gameState.logs = [];
            
            saveToLocalStorage();
            
            // 同步建立雲端隊伍資料庫節點
            const safeKey = nameInput.replace(/[\.\$\#\[\]]/g, "_");
            database.ref('teams/' + safeKey).set({
                teamName: gameState.teamName,
                startTime: gameState.startTime,
                unlockedIds: "",
                lastActive: new Date().toLocaleString()
            });

            renderSavedGame();
        }

        function renderSavedGame() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('currentTeamDisplay').innerHTML = `🏃‍♂️ 正在冒險的隊伍：<strong>${gameState.teamName}</strong> (開始時間：${gameState.startTime})`;

            gameState.unlockedIds.forEach(id => {
                applyUnlockVisuals(id);
            });
        }

        function submitCode() {
            const inputField = document.getElementById('codeInputField');
            const code = inputField.value.trim().toUpperCase();
            if (!code) return;

            // 管理員代碼：在輸入框打 ADMIN888 開啟後台
            if (code === 'ADMIN888') {
                openAdminConsole();
                inputField.value = "";
                return;
            }

            const element = codeBook[code];
            if (element) {
                if (gameState.unlockedIds.includes(element.id)) {
                    showModal("已經解鎖過囉！", "你已獲得這個元素，請繼續尋找其他元素代碼！");
                } else {
                    gameState.unlockedIds.push(element.id);
                    gameState.logs.push({
                        id: element.id,
                        elementName: element.letter + element.word,
                        time: new Date().toLocaleString()
                    });
                    saveToLocalStorage();
                    
                    // 同步更新進度到雲端
                    const safeKey = gameState.teamName.replace(/[\.\$\#\[\]]/g, "_");
                    database.ref('teams/' + safeKey).update({
                        unlockedIds: gameState.unlockedIds.join(','),
                        lastActive: new Date().toLocaleString()
                    });
                    
                    applyUnlockVisuals(element.id);
                    checkMilestones(element.letter + element.word);
                }
            } else {
                showModal("🔮 代碼無效", "找不到對應這個元素代碼的地圖板塊，請確認代碼是否有輸入錯誤。");
            }
            inputField.value = "";
        }

        function applyUnlockVisuals(id) {
            document.getElementById(`slice-${id}`).classList.add('unlocked');
            const data = Object.values(codeBook).find(item => item.id === id);
            
            // 點亮上方 LEVEL UP 燈號
            const slot = document.getElementById(`slot-${id}`);
            slot.classList.add('active');
            slot.textContent = data.letter;

            // 顯示該區塊的名牌
            const box = document.getElementById(`box-${id}`);
            box.classList.add('active');
            box.innerHTML = `<span class="first-letter">${data.letter}</span>${data.word}`;
        }

        function checkMilestones(currentWord) {
            const count = gameState.unlockedIds.length;
            if (count === 7) {
                showModal("🎉 終極成就：LEVEL UP！ 🎉", `成功啟動最後一個元素「${currentWord}」！你們完美集齊了七大元素並成功發掘這個冒險地圖的每個角落！請立刻前往終點站領取大會榮譽獎品！`);
            } else if (count === 5) {
                showModal("🌟 實力驚人 🌟", `成功喚醒「${currentWord}」區塊！恭喜你們收集到 5 個元素了，隱藏訊息 <strong>LEVEL UP</strong> 快要完全出現了！加油！`);
            } else if (count === 3) {
                showModal("✨ 初試身手 ✨", `成功喚醒「${currentWord}」區塊！恭喜你們收集到 3 個元素了，這裏還有許多角落還未被發掘，讓我們繼續前進下一站！`);
            } else {
                showModal("解鎖成功！", `恭喜獲得 <strong>${currentWord}</strong> 元素！相關地圖區域已成功被激活！`);
            }
        }

        // 後台管理面板：直接抓取 Firebase 雲端所有人紀錄
        function openAdminConsole() {
            database.ref('teams').once('value').then((snapshot) => {
                const allTeams = snapshot.val();
                let logRows = "";
                let teamCount = 0;

                if (allTeams) {
                    Object.keys(allTeams).forEach(key => {
                        const team = allTeams[key];
                        teamCount++;
                        const progressCount = team.unlockedIds ? team.unlockedIds.split(',').length : 0;
                        logRows += `<tr>
                            <td><strong>${team.teamName}</strong></td>
                            <td style="font-size:12px;">${team.startTime}</td>
                            <td><span style="color:#e67e22;font-weight:bold;">已解鎖 ${progressCount} / 7</span><br><small style="color:gray;">(${team.unlockedIds || '無'})</small></td>
                            <td style="font-size:12px;">${team.lastActive || '無'}</td>
                        </tr>`;
                    });
                } else {
                    logRows = `<tr><td colspan="4" style="text-align:center; color:gray;">目前還沒有任何隊伍開始冒險唷！</td></tr>`;
                }

                const adminHtml = `
                    <div style="text-align:left;">
                        <p><strong>📊 目前雲端總參與人數/隊伍數：</strong> <span style="font-size:18px; color:green; font-weight:bold;">${teamCount}</span> 組</p>
                        <table class="admin-table">
                            <thead>
                                <tr><th>隊伍名稱</th><th>登入時間</th><th>目前進度</th><th>最後活躍</th></tr>
                            </thead>
                            <tbody>${logRows}</tbody>
                        </table>
                        <br>
                        <button class="reset-btn" onclick="resetProgress()" style="width:100%; padding: 10px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer;">🔄 清除本機畫面（返回隊伍登入頁）</button>
                    </div>
                `;
                
                document.getElementById('modalTitle').textContent = "📋 大會中央雲端數據控制台";
                document.getElementById('modalBody').innerHTML = adminHtml;
                document.getElementById('modalBtn').textContent = "關閉控制台";
                document.getElementById('commonModal').style.display = 'flex';
            });
        }

        function resetProgress() {
            if (confirm("確定要格式化清除「此裝置」的畫面並返回登入頁嗎？(不會刪除雲端其他人的數據)")) {
                localStorage.removeItem('adventure_game_state');
                location.reload();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('adventure_game_state', JSON.stringify(gameState));
        }

        function showModal(title, body) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalBtn').textContent = "繼續前進";
            document.getElementById('commonModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('commonModal').style.display = 'none';
        }

        document.getElementById('codeInputField').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitCode();
        });
    </script>
</body>
</html>
